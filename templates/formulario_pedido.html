{% extends 'base.html' %}

{% block conteudo %}
<h2>Novo Pedido de {{ tipo }}</h2>

<p><strong>Produto:</strong> {{ produto.nome }}</p>
<p><strong>Quantidade atual:</strong> {{ produto.quantidade }}</p>

<form action="{{ url_for('salvar_pedido') }}" method="POST">
    <input type="hidden" name="produto_id" value="{{ produto.id }}">
    <input type="hidden" name="tipo" value="{{ tipo }}">

    <label>Quantidade:</label>
    <input type="number" name="quantidade" value="{{ pedido.quantidade if pedido else '' }}" required>

    <label>Observação:</label>
    <input type="text" name="observacao" value="{{ pedido.observacao if pedido else '' }}">

    <button type="submit">Salvar Pedido</button>
</form>
{% endblock %}
