{% extends 'base.html' %}

{% block conteudo %}
<h2>{{ 'Editar Produto' if produto and produto.id else 'Cadastrar Produto' }}</h2>

<form method="POST" action="{% if produto and produto.id %}{{ url_for('atualizar_produto', id=produto.id) }}{% else %}{{ url_for('salvar_produto') }}{% endif %}">
    <label>Nome:</label>
    <input type="text" name="nome" value="{{ produto.nome if produto else '' }}" required>

    <label>Descrição:</label>
    <input type="text" name="descricao" value="{{ produto.descricao if produto else '' }}">

    <label>Categoria:</label>
    <input type="text" name="categoria" value="{{ produto.categoria if produto else '' }}">

    <label>Unidade de medida:</label>
    <input type="text" name="unidade_medida" value="{{ produto.unidade_medida if produto else '' }}">

    <label>Quantidade:</label>
    <input type="number" name="quantidade" value="{{ produto.quantidade if produto else 0 }}" required>

    <label>Estoque mínimo:</label>
    <input type="number" name="estoque_minimo" value="{{ produto.estoque_minimo if produto else 0 }}" required>

    <label>Preço de custo:</label>
    <input type="number" step="0.01" name="preco_custo" value="{{ produto.preco_custo if produto else 0 }}" required>

    <label>Preço de venda:</label>
    <input type="number" step="0.01" name="preco_venda" value="{{ produto.preco_venda if produto else 0 }}" required>

    <button type="submit">Salvar</button>
</form>
{% endblock %}
