{% extends 'base.html' %}

{% block conteudo %}
<h2>Histórico de Movimentações</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Produto</th>
        <th>Tipo</th>
        <th>Quantidade</th>
        <th>Data</th>
    </tr>

    {% for mov in movimentacoes %}
    <tr>
        <td>{{ mov.id }}</td>
        <td>{{ mov.produto }}</td>
        <td>{{ mov.tipo_movimentacao }}</td>
        <td>{{ mov.quantidade }}</td>
        <td>{{ mov.data_movimentacao }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
